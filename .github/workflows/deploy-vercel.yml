name: Deploy Vercel

on:
  push:
    branches:
      - main
      - "codex/**"
  repository_dispatch:
    types:
      - vault-sync
  workflow_dispatch:

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      SITE_URL: ${{ vars.SITE_URL }}
      VAULT_REPO: ${{ vars.VAULT_REPO }}
      VAULT_REF: ${{ vars.VAULT_REF }}
      DEFAULT_VAULT_PATH: ${{ github.workspace }}/content/example

    steps:
      - name: Check out site repository
        uses: actions/checkout@v4

      - name: Check out vault repository
        if: ${{ vars.VAULT_REPO != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.VAULT_REPO }}
          ref: ${{ vars.VAULT_REF != '' && vars.VAULT_REF || 'main' }}
          path: .vault-source
          token: ${{ secrets.VAULT_REPO_TOKEN }}

      - name: Resolve vault path
        run: |
          if [ -d "${GITHUB_WORKSPACE}/.vault-source" ]; then
            echo "OBSIDIAN_VAULT_PATH=${GITHUB_WORKSPACE}/.vault-source" >> "${GITHUB_ENV}"
          else
            echo "OBSIDIAN_VAULT_PATH=${DEFAULT_VAULT_PATH}" >> "${GITHUB_ENV}"
          fi

      - name: Validate Vercel secrets
        run: |
          test -n "${VERCEL_TOKEN}"
          test -n "${VERCEL_ORG_ID}"
          test -n "${VERCEL_PROJECT_ID}"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Ensure mirror directories exist
        run: mkdir -p content/notes public/obsidian-assets

      - name: Sync published vault content
        run: bun run content:sync

      - name: Pull Vercel project settings
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            bunx vercel@latest pull --yes --environment=production --token "${VERCEL_TOKEN}"
          else
            bunx vercel@latest pull --yes --environment=preview --token "${VERCEL_TOKEN}"
          fi

      - name: Build Vercel output
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            bunx vercel@latest build --prod --token "${VERCEL_TOKEN}"
          else
            bunx vercel@latest build --token "${VERCEL_TOKEN}"
          fi

      - name: Deploy to Vercel
        id: deploy
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            url="$(bunx vercel@latest deploy --prebuilt --prod --token "${VERCEL_TOKEN}")"
          else
            url="$(bunx vercel@latest deploy --prebuilt --token "${VERCEL_TOKEN}")"
          fi
          echo "deployment_url=${url}" >> "${GITHUB_OUTPUT}"

      - name: Write deployment summary
        run: |
          {
            echo "## Vercel Deployment"
            echo
            echo "- Ref: \`${GITHUB_REF}\`"
            echo "- Vault source: \`${OBSIDIAN_VAULT_PATH}\`"
            echo "- URL: ${{ steps.deploy.outputs.deployment_url }}"
          } >> "${GITHUB_STEP_SUMMARY}"
